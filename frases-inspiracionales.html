<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frases inspiracionales — ViajecitosCheck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --lilac-deep:#7c3aed; --lilac-soft:#ddd6fe; --pink-deep:#db2777; --pink-soft:#fbcfe8; --cream:#fdf4ff; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{min-height:100vh;font-family:"Quicksand",system-ui,sans-serif;background:linear-gradient(145deg,var(--cream),var(--lilac-soft),var(--pink-soft));color:#4c1d95;padding:clamp(1rem,4vw,2rem)}
        .site-header{width:min(980px,100%);margin:0 auto 1rem;padding:.7rem .85rem;border-radius:20px;border:1px solid rgba(167,139,250,.35);background:rgba(255,255,255,.72);backdrop-filter:blur(8px);box-shadow:0 8px 26px rgba(124,58,237,.11);display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:.8rem}
        .site-logo{font-size:1.12rem;font-weight:800;color:var(--lilac-deep)}
        .site-nav,.auth-actions{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
        .site-nav a,.auth-btn{text-decoration:none;color:#5b21b6;font-weight:700;font-size:.9rem;padding:.42rem .78rem;border-radius:999px;border:1px solid rgba(167,139,250,.55);background:rgba(255,255,255,.82);transition:transform .15s ease}
        .site-nav a:hover,.auth-btn:hover{transform:scale(1.05)}
        .site-nav a.active{color:#a855f7;background:rgba(255,255,255,.92)}
        .auth-btn.primary{border-color:transparent;background:linear-gradient(120deg,#7c3aed,#db2777);color:#fff}
        .shell{width:min(980px,100%);margin:0 auto;border-radius:24px;border:1px solid rgba(167,139,250,.35);background:linear-gradient(135deg,rgba(255,255,255,.88),rgba(252,231,243,.88));box-shadow:0 4px 28px rgba(124,58,237,.12);padding:clamp(1.1rem,3vw,1.7rem)}
        h1{font-size:clamp(1.55rem,5vw,2.1rem);background:linear-gradient(120deg,var(--lilac-deep),var(--pink-deep));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:.35rem}
        .intro{color:#86198f;opacity:.92;margin-bottom:1rem}
        .quote-card{border:1px solid rgba(167,139,250,.35);border-radius:18px;background:rgba(255,255,255,.78);box-shadow:0 6px 20px rgba(124,58,237,.09);padding:1rem}
        .quote-text{font-size:1.12rem;font-weight:700;line-height:1.5;color:#5b21b6;min-height:4.2rem}
        .btn-row{margin-top:.8rem;display:flex;flex-wrap:wrap;gap:.5rem}
        .btn{border:1px solid rgba(167,139,250,.5);border-radius:999px;background:rgba(255,255,255,.85);color:#6d28d9;font-family:inherit;font-weight:800;font-size:.86rem;padding:.45rem .85rem;cursor:pointer;transition:transform .15s ease}
        .btn:hover{transform:scale(1.05)}
        .btn.primary{border-color:transparent;background:linear-gradient(120deg,#7c3aed,#db2777);color:#fff}
        .favorites{margin-top:1rem}
        .favorites h2{font-size:1rem;color:#5b21b6;margin-bottom:.55rem}
        .favorites-list{list-style:none;display:grid;gap:.45rem}
        .favorites-list li{border:1px solid rgba(167,139,250,.3);border-radius:12px;background:rgba(255,255,255,.75);padding:.55rem .65rem;display:flex;gap:.5rem;justify-content:space-between;align-items:flex-start}
        .favorites-list p{font-size:.88rem;color:#6b21a8;line-height:1.35;flex:1}
        .mini-del{border:1px solid rgba(244,114,182,.55);border-radius:999px;padding:.25rem .55rem;background:#fff;color:#be185d;font-family:inherit;font-size:.76rem;font-weight:700;cursor:pointer}
        @media (max-width:860px){.site-header{flex-direction:column;align-items:flex-start}.site-nav,.auth-actions{width:100%}}
    </style>
</head>
<body>
    <header class="site-header">
        <div class="site-logo">ViajecitosCheck</div>
        <nav class="site-nav" aria-label="Menu principal">
            <a href="index.html">Inicio</a><a href="agenda-viaje.html">Agenda</a><a href="mapa-suenos.html">Mapa de sueños</a><a href="blog-viajes.html">Blog</a><a href="inspiracion-viajera.html">Inspiración</a><a class="active" href="frases-inspiracionales.html">Frases</a>
        </nav>
        <div class="auth-actions"><a class="auth-btn" href="index.html">Crear perfil</a><a class="auth-btn primary" href="index.html">Iniciar sesión</a></div>
    </header>
    <main class="shell">
        <h1>Frases inspiracionales</h1>
        <p class="intro">Una dosis de motivación para acercarte a tu próximo viaje.</p>
        <section class="quote-card">
            <p class="quote-text" id="quoteText"></p>
            <div class="btn-row">
                <button class="btn primary" id="newQuoteBtn" type="button">Nueva frase</button>
                <button class="btn" id="saveQuoteBtn" type="button">Guardar favorita</button>
            </div>
        </section>
        <section class="favorites">
            <h2>Favoritas</h2>
            <ul class="favorites-list" id="favoritesList"></ul>
        </section>
    </main>
    <script>
        const KEY = "devtata-quote-favorites";
        const QUOTES = [
            "Viajar no es escapar de la vida, es evitar que la vida se te escape.",
            "El mundo es un libro y quien no viaja solo lee una pagina.",
            "Cada destino te cambia de una forma que no esperabas.",
            "Primero sueñas el viaje, despues el viaje te transforma.",
            "No necesitas todo resuelto para empezar a avanzar.",
            "Tu proxima aventura empieza con una decision pequeña hoy."
        ];
        const quoteText = document.getElementById("quoteText");
        const favoritesList = document.getElementById("favoritesList");
        let currentQuote = "";

        function loadFavs() { try { const raw = localStorage.getItem(KEY); return raw ? JSON.parse(raw) : []; } catch (_) { return []; } }
        function saveFavs(items) { localStorage.setItem(KEY, JSON.stringify(items)); }
        function randomQuote() {
            const available = QUOTES.filter((q) => q !== currentQuote);
            currentQuote = available[Math.floor(Math.random() * available.length)] || QUOTES[0];
            quoteText.textContent = currentQuote;
        }
        function renderFavs() {
            const items = loadFavs();
            favoritesList.innerHTML = "";
            if (!items.length) {
                const li = document.createElement("li");
                li.innerHTML = "<p>Aun no guardas frases favoritas.</p>";
                favoritesList.append(li);
                return;
            }
            items.forEach((item, idx) => {
                const li = document.createElement("li");
                const p = document.createElement("p");
                p.textContent = item;
                const del = document.createElement("button");
                del.className = "mini-del";
                del.type = "button";
                del.textContent = "Quitar";
                del.addEventListener("click", () => {
                    const next = loadFavs().filter((_, i) => i !== idx);
                    saveFavs(next);
                    renderFavs();
                });
                li.append(p, del);
                favoritesList.append(li);
            });
        }

        document.getElementById("newQuoteBtn").addEventListener("click", randomQuote);
        document.getElementById("saveQuoteBtn").addEventListener("click", () => {
            if (!currentQuote) return;
            const items = loadFavs();
            if (!items.includes(currentQuote)) {
                items.unshift(currentQuote);
                saveFavs(items.slice(0, 20));
                renderFavs();
            }
        });
        randomQuote();
        renderFavs();
    </script>
</body>
</html>
