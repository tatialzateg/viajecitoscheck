            .article-grid, .benefits-grid, .explore-grid, .stats-grid, .moments-grid, .retos-grid,
            .check-grid, .dreams-grid, .posts-grid, .quiz-grid, .cards-grid, .landing-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="site-header-inner">
        <div class="site-logo">ViajecitosCheck</div>
        <button type="button" class="nav-toggle" id="navToggleBtn" aria-label="Abrir menu">☰</button>
        <button type="button" class="auth-btn" id="themeToggleBtn" aria-label="Cambiar tema" aria-pressed="false" title="Cambiar tema"><span class="theme-knob" aria-hidden="true">☀</span></button>
        <nav class="site-nav" aria-label="Menu principal">
            <a href="index.html">Inicio</a><a href="agenda-viaje.html">Agenda</a><a href="mapa-suenos.html">Mapa de sueños</a><a href="blog-viajes.html">Blog</a><a href="inspiracion-viajera.html">Inspiración</a><a class="active" href="frases-inspiracionales.html">Frases</a><a href="descubre-tu-viaje.html">Quiz</a>
        </nav>
        <div class="header-right"><div class="auth-actions" id="guestAuthActions"><a class="auth-btn" href="index.html">Crear perfil</a><a class="auth-btn primary" href="index.html">Iniciar sesión</a></div><div class="auth-actions is-hidden" id="userAuthActions"><a class="auth-btn" href="index.html">Editar perfil</a><a class="auth-btn" href="index.html">Salir</a></div></div>
        </div>
    </header>
    <main class="shell">
        <h1>Frases inspiracionales</h1>
        <p class="intro">Una dosis de motivación para acercarte a tu próximo viaje.</p>
        <section class="quote-card">
            <p class="quote-text" id="quoteText"></p>
            <div class="btn-row">
                <button class="btn primary" id="newQuoteBtn" type="button">Nueva frase</button>
                <button class="btn" id="saveQuoteBtn" type="button">Guardar favorita</button>
            </div>
        </section>
        <section class="favorites">
            <h2>Favoritas</h2>
            <ul class="favorites-list" id="favoritesList"></ul>
        </section>
    </main>
    <script>
        const navToggleBtn = document.getElementById("navToggleBtn");
        const siteHeader = document.querySelector(".site-header");
        const themeToggleBtn = document.getElementById("themeToggleBtn");
        const THEME_KEY = "devtata-theme";
        navToggleBtn?.addEventListener("click", () => siteHeader?.classList.toggle("is-open"));
        function applyTheme(theme) {
            document.documentElement.setAttribute("data-theme", theme);
            if (!themeToggleBtn) return;
            const knob = themeToggleBtn.querySelector(".theme-knob");
            themeToggleBtn.setAttribute("aria-pressed", theme === "dark" ? "true" : "false");
            themeToggleBtn.title = theme === "dark" ? "Activar modo claro" : "Activar modo oscuro";
            if (knob) knob.textContent = theme === "dark" ? "☾" : "☀";
        }
        applyTheme(localStorage.getItem(THEME_KEY) || "light");
        themeToggleBtn?.addEventListener("click", () => {
            const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
            localStorage.setItem(THEME_KEY, next);
            applyTheme(next);
        });

        const KEY = "devtata-quote-favorites";
        const QUOTES = [
            "Viajar no es escapar de la vida, es evitar que la vida se te escape.",
            "El mundo es un libro y quien no viaja solo lee una pagina.",
            "Cada destino te cambia de una forma que no esperabas.",
            "Primero sueñas el viaje, despues el viaje te transforma.",
            "No necesitas todo resuelto para empezar a avanzar.",
            "Tu proxima aventura empieza con una decision pequeña hoy."
        ];
        const quoteText = document.getElementById("quoteText");
        const favoritesList = document.getElementById("favoritesList");
        let currentQuote = "";

        function loadFavs() { try { const raw = localStorage.getItem(KEY); return raw ? JSON.parse(raw) : []; } catch (_) { return []; } }
        function saveFavs(items) { localStorage.setItem(KEY, JSON.stringify(items)); }
        function randomQuote() {
            const available = QUOTES.filter((q) => q !== currentQuote);
            currentQuote = available[Math.floor(Math.random() * available.length)] || QUOTES[0];
            quoteText.textContent = currentQuote;
        }
        function renderFavs() {
            const items = loadFavs();
            favoritesList.innerHTML = "";
            if (!items.length) {
                const li = document.createElement("li");
                li.innerHTML = "<p>Aun no guardas frases favoritas.</p>";
                favoritesList.append(li);
                return;
            }
            items.forEach((item, idx) => {
                const li = document.createElement("li");
                const p = document.createElement("p");
                p.textContent = item;
                const del = document.createElement("button");
                del.className = "mini-del";
                del.type = "button";
                del.textContent = "Quitar";
                del.addEventListener("click", () => {
                    const next = loadFavs().filter((_, i) => i !== idx);
                    saveFavs(next);
                    renderFavs();
                });
                li.append(p, del);
                favoritesList.append(li);
            });
        }

        document.getElementById("newQuoteBtn").addEventListener("click", randomQuote);
        document.getElementById("saveQuoteBtn").addEventListener("click", () => {
            if (!currentQuote) return;
            const items = loadFavs();
            if (!items.includes(currentQuote)) {
                items.unshift(currentQuote);
                saveFavs(items.slice(0, 20));
                renderFavs();
            }
        });
        randomQuote();
        renderFavs();
    </script>
</body>
</html>
